<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="welcome">
    <h1>Welcome to Weather App</h1>
    <p>Get real-time weather updates for any city around the world</p>
  </header>

  <div class="container">
    <div class="top-bar">
      <h2>Weather App</h2>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </div>

    <form id="searchForm" class="search-box">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name..."
        autocomplete="off"
      />
      <button type="submit">Search</button>
    </form>

    <!-- shown while fetching data -->
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- shown when city is not found / fetch fails -->
    <div id="errorBox" class="error-box hidden">
      <p id="errorText">City not found. Please try again.</p>
    </div>

    <!-- main weather card -->
    <div id="weatherCard" class="weather-card hidden">
      <h2 id="cityName"></h2>
      <p id="dateTime"></p>

      <div class="main-info">
        <img id="weatherIcon" src="" alt="weather icon" />
        <h1 id="temperature"></h1>
      </div>

      <p id="description" class="description"></p>

      <div class="details">
        <div class="detail-item">
          <span class="label">Humidity</span>
          <span id="humidity" class="value"></span>
        </div>
        <div class="detail-item">
          <span class="label">Wind Speed</span>
          <span id="wind" class="value"></span>
        </div>
        <div class="detail-item">
          <span class="label">Feels Like</span>
          <span id="feelsLike" class="value"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
